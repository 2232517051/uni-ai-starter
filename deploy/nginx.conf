# ===========================================
# uni-ai-starter Nginx Configuration
# ===========================================
# Usage:
#   1. Replace YOUR_DOMAIN with your actual domain
#   2. Replace /path/to/ssl/ with your SSL cert path
#   3. Replace /path/to/h5/ with your frontend build output path
#   4. Copy to nginx/conf/conf.d/ or include in nginx.conf

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL Certificate
    ssl_certificate     /path/to/ssl/fullchain.pem;
    ssl_certificate_key /path/to/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Frontend static files (H5 build output)
    root /path/to/h5/;
    index index.html;

    # Frontend routes: try static file first, fallback to index.html for SPA
    location / {
        try_files $uri $uri/ /index.html @backend;
    }

    # Backend API proxy
    location @backend {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Explicit API routes → FastAPI
    location ~ ^/(login|register|chat|user|conversations|conversation|history|clear|pay_qrcode) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # FastAPI docs (optional, remove in production)
    location /docs {
        proxy_pass http://127.0.0.1:8000;
    }
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
